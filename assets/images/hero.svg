  <!-- legs -->
  <rect x="11" y="24" width="4" height="5" fill="#29366f"/>
  <rect x="17" y="24" width="4" height="5" fill="#29366f"/>
  <!-- body armor -->
  <rect x="10" y="14" width="12" height="11" fill="#3b5dc9"/>
  <rect x="11" y="15" width="10" height="7" fill="#41a6f6"/>
  <rect x="13" y="17" width="6" height="4" fill="#29366f"/>
