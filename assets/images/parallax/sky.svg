  <rect width="160" height="45" fill="#29366f"/>
  <!-- stars -->
  <rect x="12" y="8" width="2" height="2" fill="#f4f4f4"/>
  <rect x="45" y="18" width="2" height="2" fill="#f4f4f4"/>
  <rect x="78" y="6" width="2" height="2" fill="#f4f4f4"/>
  <rect x="110" y="14" width="2" height="2" fill="#f4f4f4"/>
  <rect x="140" y="10" width="2" height="2" fill="#f4f4f4"/>
  <rect x="28" y="28" width="1" height="1" fill="#73eff7"/>
  <rect x="95" y="22" width="1" height="1" fill="#73eff7"/>
  <!-- moon -->
